precision: bf16-mixed
device: auto 
num_workers: 16
num_threads: 1
train:
  # training data manifests
  training_data:
     - /home/bkiessling/all_train.lst
     - /home/bkiessling/synth.lst
  evaluation_data:
    - /home/bkiessling/val.lst
  # directory to save checkpoints in
  checkpoint_path: /home/bkiessling/experiments/base_orli
  # base configuration of training epochs and LR schedule
  optimizer: AdamW
  epochs: 24
  lrate: 5e-4
  schedule: cosine
  cos_t_max: 24
  cos_min_lr: 5e-6
  warmup: 1000
  augment: true
  # effective batch size params
  batch_size: 8
  val_batch_size: 8
  accumulate_grad_batches: 8
