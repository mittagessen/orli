precision: bf16-mixed
device: auto
num_workers: 12
num_threads: 1
train:
  # training data manifests
  training_data:
    - /home/bkiessling/orli_overfit.lst
  evaluation_data:
    - /home/bkiessling/orli_overfit_val.lst
  # directory to save checkpoints in
  checkpoint_path: /home/bkiessling/experiments/base_orli_single_anchor
  image_size: [1280, 960]
  # base configuration of training epochs and LR schedule
  optimizer: AdamW
  epochs: 24
  lrate: 3e-4
  schedule: cosine
  cos_t_max: 24
  cos_min_lr: 1e-5
  warmup: 2000
  augment: true
  teacher_force_anchors: false
  anchors:
    - [0.3643205761909485, 0.40683621168136597, 0.45212066173553467, 0.45817136764526367, 0.5401448011398315, 0.5093595385551453, 0.6279962062835693, 0.560873806476593]
  # effective batch size params
  batch_size: 12
  val_batch_size: 16
  accumulate_grad_batches: 4
  pl_logger: wandb
