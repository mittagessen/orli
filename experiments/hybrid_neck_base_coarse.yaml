precision: bf16-mixed
device: auto
num_workers: 16
num_threads: 1
train:
  training_data:
    - /home/bkiessling/all_train.lst
    - /home/bkiessling/synth.lst
  evaluation_data:
    - /home/bkiessling/val.lst
  checkpoint_path: /home/bkiessling/experiments/orli_hybrid_neck_base_coarse
  optimizer: AdamW
  epochs: 24
  lrate: 5e-4
  schedule: cosine
  cos_t_max: 24
  cos_min_lr: 5e-6
  warmup: 1000
  augment: true
  batch_size: 8
  val_batch_size: 8
  accumulate_grad_batches: 8
  pl_logger: wandb
  encoder_name: convnextv2_base
  encoder_idxs: [1, 2, 3]
  neck_type: hybrid
  neck_num_layers: 1
  neck_num_heads: 8
  neck_hidden_dim: 256
  neck_use_encoder_idx: [2]
  neck_output_ds_factors: [2, 2, 2]
  neck_norm: group
  neck_ffn_dim: 1024
  neck_dropout: 0.0
  neck_fusion_depth: 2
