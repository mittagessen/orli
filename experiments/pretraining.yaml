precision: bf16-mixed
device: auto 
num_workers: 12
num_threads: 1
train:
  # training data manifests
  training_data:
     - /home/bkiessling/orli_overfit.lst
  evaluation_data:
    - /home/bkiessling/orli_overfit_val.lst
  # directory to save checkpoints in
  checkpoint_path: /home/bkiessling/experiments/base_orli
  # base configuration of training epochs and LR schedule
  optimizer: AdamW
  epochs: 24
  lrate: 3e-4
  schedule: cosine
  cos_t_max: 24
  cos_min_lr: 1e-5
  warmup: 2000
  augment: true
  # effective batch size params
  batch_size: 12
  val_batch_size: 16
  accumulate_grad_batches: 8
